<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

    <!-- Monospace font with emoji fallback -->
    <alias>
        <family>monospace</family>
        <prefer>
            <family>JetBrains Mono NF</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>

    <!-- Courier font with emoji fallback -->
    <alias>
        <family>courier</family>
        <prefer>
            <family>JetBrains Mono NF</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>

</fontconfig>
