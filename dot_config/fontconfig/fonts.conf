<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- MONOSPACE / COURIER -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>JetBrainsMono NF</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias>
    <family>Courier</family>
    <prefer>
      <family>JetBrainsMono NF</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias>
    <family>Courier New</family>
    <prefer>
      <family>JetBrainsMono NF</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>


  <!-- SANS-SERIF -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Inter Variable</family>
      <family>Noto Sans</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>


  <!-- SERIF -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>


  <!-- EMOJI -->
  <alias>
    <family>emoji</family>
    <prefer>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

</fontconfig
