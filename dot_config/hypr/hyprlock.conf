# Nordic Hyprlock Config
# Font: JetBrainsMono Nerd Font
# Corners: 0px

general {
    hide_cursor = true
}

background {
    monitor =
    color = rgba(2E3440ff)
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(D8DEE9ff)
    font_size = 72
    font_family = JetBrainsMono NF
    position = 0, 80
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %d %B')"
    color = rgba(D8DEE9cc)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 30
    halign = center
    valign = center
}

# Password box
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2

    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true

    outer_color = rgba(8FBCBBff)
    inner_color = rgba(3B4252ff)
    font_color = rgba(D8DEE9ff)

    fade_on_empty = false
    placeholder_text = <span foreground="##D8DEE9aa">Password...</span>

    rounding = 0

    check_color = rgba(88C0D0ff)
    fail_color = rgba(BF616Aff)

    position = 0, -40
    halign = center
    valign = center
}

# User label
label {
    monitor =
    text = $USER
    color = rgba(D8DEE9aa)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -100
    halign = center
    valign = center
}
